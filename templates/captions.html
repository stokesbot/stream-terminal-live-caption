<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Captions — Stream Terminal</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  /* ─── Reset ─── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #fff;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ─── Layout ─── */
  #app {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    width: 100%; height: 100%;
    padding: 2vh 3vw;
    position: relative;
  }

  /* ─── Status Bar ─── */
  #status-bar {
    position: absolute;
    top: 1.5vh; left: 3vw;
    display: flex;
    align-items: center;
    gap: 1vw;
    font-size: 1.2vw;
    opacity: 0.6;
    transition: opacity 0.3s;
    z-index: 10;
  }
  #status-dot {
    width: 0.8vw; height: 0.8vw;
    border-radius: 50%;
    background: #888;
    transition: background 0.3s;
  }
  #status-dot.ok { background: #00ff66; box-shadow: 0 0 0.5vw #00ff66; }
  #status-dot.warn { background: #ffaa00; box-shadow: 0 0 0.5vw #ffaa00; }
  #status-dot.error { background: #ff3333; box-shadow: 0 0 0.5vw #ff3333; }
  #status-text { font-weight: 500; letter-spacing: 0.02em; }

  /* ─── Caption Area ─── */
  #caption-stage {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 1.5vh;
    padding-bottom: 3vh;
  }

  .caption-line {
    width: 100%;
    text-align: center;
    line-height: 1.35;
    font-weight: 600;
    text-shadow: 0 0.15vw 0.4vw rgba(0,0,0,0.9);
    transition: opacity 0.2s, transform 0.2s;
  }

  /* Previous (committed) caption — slightly dimmed */
  .caption-line.prev {
    font-size: 2.8vw;
    color: #ccc;
    opacity: 0.7;
    min-height: 3.8vw;
  }

  /* Current (live/interim) caption — bright, prominent */
  .caption-line.current {
    font-size: 4.2vw;
    color: #ffffff;
    opacity: 1;
    min-height: 5.7vw;
  }
  .caption-line.current.interim {
    color: #ffeb3b; /* Yellow tint while still translating */
  }

  /* ─── Fullscreen Hint ─── */
  #fullscreen-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2vw;
    opacity: 0.4;
    pointer-events: none;
    display: none;
  }

  /* ─── Branding watermark ─── */
  #watermark {
    position: absolute;
    bottom: 1.5vh; right: 3vw;
    font-size: 1vw;
    opacity: 0.25;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div id="app">
  <div id="status-bar">
    <div id="status-dot"></div>
    <div id="status-text">Connecting…</div>
  </div>

  <div id="caption-stage">
    <div class="caption-line prev" id="prev-line">—</div>
    <div class="caption-line current" id="curr-line">Waiting for audio…</div>
  </div>

  <div id="watermark">STREAM TERMINAL · LIVE CAPTIONS</div>
</div>

<script>
(function() {
  const STATUS = {
    dot: document.getElementById('status-dot'),
    text: document.getElementById('status-text')
  };
  const PREV = document.getElementById('prev-line');
  const CURR = document.getElementById('curr-line');

  let lastFinal = '';

  function setStatus(msg, level) {
    STATUS.text.textContent = msg;
    STATUS.dot.className = '';
    if (level) STATUS.dot.classList.add(level);
  }

  function goFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }

  // Auto-fullscreen on first click (browsers require user gesture)
  document.addEventListener('click', () => {
    if (!document.fullscreenElement) goFullscreen();
  }, { once: true });

  // Try auto-fullscreen on load (works in some kiosk/PWA contexts)
  window.addEventListener('load', () => {
    setTimeout(() => {
      if (!document.fullscreenElement) goFullscreen();
    }, 300);
  });

  // ─── Socket.IO ───
  const socket = io({
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionDelay: 1000
  });

  socket.on('connect', () => {
    setStatus('Connected', 'ok');
    CURR.textContent = 'Listening for audio…';
  });

  socket.on('disconnect', () => {
    setStatus('Disconnected — reconnecting…', 'warn');
  });

  socket.on('status', (data) => {
    setStatus(data.message, data.level || 'ok');
  });

  // Interim (partial) caption
  socket.on('caption_update', (data) => {
    if (data.text) {
      CURR.textContent = data.text;
      CURR.classList.add('interim');
    }
  });

  // Final (committed) caption
  socket.on('caption_commit', (data) => {
    if (data.text) {
      CURR.classList.remove('interim');
      // Roll current to previous, show new current
      if (lastFinal && lastFinal !== data.text) {
        PREV.textContent = lastFinal;
      }
      CURR.textContent = data.text;
      lastFinal = data.text;
    }
  });

  // Keyboard shortcut: F = toggle fullscreen
  document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') {
      if (document.fullscreenElement) document.exitFullscreen();
      else goFullscreen();
    }
  });
})();
</script>

</body>
</html>
