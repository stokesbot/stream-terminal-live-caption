<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Captions — Stream Terminal</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000;
    --fg: #fff;
    --muted: #d6d6d6;
    --soft: #98a0aa;
    --accent: #ffd84d;
    --ok: #00ff66;
    --warn: #ffaa00;
    --error: #ff4d4d;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  body {
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  #app {
    width: 100%;
    height: 100%;
    position: relative;
    padding: 2.2vh 2.8vw;
  }

  #status-bar {
    position: absolute;
    top: 2.2vh;
    left: 2.8vw;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: clamp(14px, 1vw, 22px);
    opacity: 0.82;
    z-index: 10;
  }

  #status-dot {
    width: 0.9rem;
    height: 0.9rem;
    border-radius: 50%;
    background: #666;
    flex: 0 0 auto;
  }

  #status-dot.ok { background: var(--ok); box-shadow: 0 0 12px var(--ok); }
  #status-dot.warn { background: var(--warn); box-shadow: 0 0 12px var(--warn); }
  #status-dot.error { background: var(--error); box-shadow: 0 0 12px var(--error); }

  #status-text {
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  #hint-bar {
    position: absolute;
    top: 2.2vh;
    right: 2.8vw;
    text-align: right;
    color: var(--soft);
    font-size: clamp(12px, 0.9vw, 18px);
    opacity: 0.72;
  }

  #caption-shell {
    position: absolute;
    left: 50%;
    bottom: 5.5vh;
    transform: translateX(-50%);
    width: min(90vw, 1600px);
    min-height: 42vh;
    padding: 2.4vh 2.4vw 2.1vh;
    border-radius: 24px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  #caption-stage {
    display: grid;
    grid-template-rows: minmax(0, 1fr) auto;
    gap: 1.8vh;
    min-height: 34vh;
  }

  #history-stage {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 0.65vh;
    min-height: 0;
  }

  #live-stage {
    min-height: 5.3em;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-top: 0.8vh;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .cue {
    display: grid;
    gap: 0.12em;
    text-align: center;
    justify-items: center;
  }

  .cue-line {
    max-width: 100%;
    line-height: 1.16;
    letter-spacing: 0.01em;
    word-break: normal;
    overflow-wrap: anywhere;
    text-shadow: 0 3px 12px rgba(0,0,0,0.68);
  }

  .cue.history .cue-line {
    font-size: clamp(30px, 2.35vw, 44px);
    color: var(--muted);
    font-weight: 620;
    opacity: 0.9;
  }

  .cue.current .cue-line {
    font-size: clamp(30px, 2.35vw, 44px);
    color: var(--fg);
    font-weight: 730;
    opacity: 1;
  }

  .cue.live .cue-line {
    font-size: clamp(22px, 1.8vw, 32px);
    color: var(--accent);
    font-weight: 630;
    opacity: 0.95;
  }

  .cue.placeholder .cue-line {
    font-size: clamp(30px, 2.35vw, 44px);
    color: var(--soft);
    font-weight: 620;
    opacity: 0.72;
  }

  #caption-meta {
    margin-top: 1.4vh;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    color: var(--soft);
    font-size: clamp(13px, 0.9vw, 18px);
    opacity: 0.8;
  }

  #mode-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.38rem 0.72rem;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
  }

  #watermark {
    position: absolute;
    right: 2.8vw;
    bottom: 2.2vh;
    color: var(--soft);
    font-size: clamp(12px, 0.85vw, 16px);
    letter-spacing: 0.08em;
    opacity: 0.35;
  }

  @media (max-width: 900px) {
    #caption-shell {
      width: 94vw;
      bottom: 3vh;
      min-height: 48vh;
      padding: 2vh 3vw;
    }

    #caption-stage {
      min-height: 40vh;
    }

    #live-stage {
      min-height: 4.6em;
    }
  }
</style>
</head>
<body>
<div id="app">
  <div id="status-bar" aria-live="polite">
    <div id="status-dot"></div>
    <div id="status-text">Connecting…</div>
  </div>

  <div id="hint-bar">Click anywhere for fullscreen · Press <strong>F</strong> to toggle</div>

  <main id="caption-shell" aria-live="polite" aria-atomic="false">
    <div id="caption-stage">
      <div id="history-stage"></div>
      <div id="live-stage"></div>
    </div>
    <div id="caption-meta">
      <div id="mode-pill">Broadcast mode · fixed history · 8 visible lines</div>
      <div id="meta-detail">Fixed history stack</div>
    </div>
  </main>

  <div id="watermark">STREAM TERMINAL · LIVE CAPTIONS</div>
</div>

<script>
(function() {
  const STATUS = {
    dot: document.getElementById('status-dot'),
    text: document.getElementById('status-text')
  };

  const UI = {
    historyStage: document.getElementById('history-stage'),
    liveStage: document.getElementById('live-stage'),
    metaDetail: document.getElementById('meta-detail')
  };

  const SETTINGS = {
    maxCharsPerLine: 40,
    maxCueLines: 2,
    maxVisibleLines: 8,
    maxCueChars: 84,
    interimMinChars: 16,
    interimMinWords: 3,
    interimDebounceMs: 350,
    stablePrefixMinChars: 36,
    stablePrefixProtectTailChars: 18,
    stablePrefixConfirmations: 2,
    maxStoredCues: 16,
    smallWords: new Set(['a', 'an', 'and', 'as', 'at', 'but', 'by', 'for', 'from', 'if', 'in', 'into', 'is', 'it', 'of', 'on', 'or', 'so', 'than', 'that', 'the', 'to', 'up', 'with'])
  };

  const state = {
    committedCues: [],
    interimCue: null,
    lastInterimRenderedAt: 0,
    lastCommittedText: '',
    lastCommittedFullText: '',
    lastCommittedCueText: '',
    lastInterimText: '',
    promotedInterimPrefix: '',
    stablePrefixCandidate: '',
    stablePrefixSeenCount: 0,
    currentInterimFullText: ''
  };

  function setStatus(msg, level) {
    STATUS.text.textContent = msg;
    STATUS.dot.className = '';
    STATUS.dot.id = 'status-dot';
    if (level) STATUS.dot.classList.add(level);
  }

  function goFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  }

  document.addEventListener('click', () => {
    if (!document.fullscreenElement) goFullscreen();
  }, { once: true });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') {
      if (document.fullscreenElement) document.exitFullscreen();
      else goFullscreen();
    }
  });

  function normalizeText(text) {
    return (text || '')
      .replace(/\s+/g, ' ')
      .replace(/\s+([,.;:!?])/g, '$1')
      .trim();
  }

  function scoreBreak(words, breakIndex) {
    const left = words.slice(0, breakIndex).join(' ');
    const right = words.slice(breakIndex).join(' ');
    const leftLast = (words[breakIndex - 1] || '').toLowerCase().replace(/[^a-z']/g, '');
    const rightFirst = (words[breakIndex] || '').toLowerCase().replace(/[^a-z']/g, '');
    const leftSecondLast = (words[breakIndex - 2] || '').toLowerCase().replace(/[^a-z']/g, '');
    const rightSecond = (words[breakIndex + 1] || '').toLowerCase().replace(/[^a-z']/g, '');

    let score = 100;
    const diff = Math.abs(left.length - right.length);
    score -= diff * 1.35;

    if (left.length > SETTINGS.maxCharsPerLine || right.length > SETTINGS.maxCharsPerLine) score -= 70;
    if (left.length < 14 || right.length < 14) score -= 28;
    if (left.length < 18 || right.length < 18) score -= 12;
    if (SETTINGS.smallWords.has(leftLast)) score -= 26;
    if (SETTINGS.smallWords.has(rightFirst)) score -= 22;
    if (SETTINGS.smallWords.has(leftSecondLast) && SETTINGS.smallWords.has(leftLast)) score -= 12;
    if (SETTINGS.smallWords.has(rightFirst) && SETTINGS.smallWords.has(rightSecond)) score -= 10;
    if (/[,:;]$/.test(left)) score += 22;
    if (/[.!?]$/.test(left)) score += 12;
    if (/^(and|but|so|because|that|which|who|when|while)$/i.test(rightFirst)) score += 10;
    if (/^(the|a|an|my|your|his|her|our|their)$/i.test(rightFirst)) score -= 24;
    if (/^(to|of|for|in|on|at|with|from|by)$/i.test(rightFirst)) score -= 26;
    if (/^(is|are|was|were|be|been|being|have|has|had|do|does|did|will|would|can|could|should|may|might)$/i.test(leftLast)) score -= 18;

    return score;
  }

  function wrapCueText(text) {
    const normalized = normalizeText(text);
    if (!normalized) return [];
    if (normalized.length <= SETTINGS.maxCharsPerLine) return [normalized];

    const words = normalized.split(' ');
    if (words.length <= 1) return [normalized];

    let bestIndex = -1;
    let bestScore = -Infinity;

    for (let i = 1; i < words.length; i++) {
      const score = scoreBreak(words, i);
      if (score > bestScore) {
        bestScore = score;
        bestIndex = i;
      }
    }

    if (bestIndex === -1) return [normalized];

    const line1 = words.slice(0, bestIndex).join(' ').trim();
    const line2 = words.slice(bestIndex).join(' ').trim();

    if (!line2) return [line1];
    return [line1, line2];
  }

  function splitSegment(segment, maxChars) {
    const pieces = [];
    let remaining = normalizeText(segment);

    while (remaining.length > maxChars) {
      const probe = remaining.slice(0, maxChars + 1);
      let breakIdx = Math.max(
        probe.lastIndexOf('. '),
        probe.lastIndexOf('? '),
        probe.lastIndexOf('! '),
        probe.lastIndexOf('; '),
        probe.lastIndexOf(': '),
        probe.lastIndexOf(', '),
        probe.lastIndexOf(' ')
      );

      if (breakIdx < Math.floor(maxChars * 0.58)) breakIdx = maxChars;
      pieces.push(remaining.slice(0, breakIdx).trim());
      remaining = remaining.slice(breakIdx).trim();
    }

    if (remaining) pieces.push(remaining);
    return pieces.filter(Boolean);
  }

  function textToCueTexts(text) {
    const normalized = normalizeText(text);
    if (!normalized) return [];

    const segments = normalized
      .split(/(?<=[.!?])\s+/)
      .flatMap(part => part.split(/(?<=[:;])\s+/))
      .flatMap(part => part.split(/(?<=,)\s+(?=(and|but|so|because|which|that|we|you|they|it)\b)/i))
      .map(part => normalizeText(part))
      .filter(Boolean);

    const cueTexts = [];
    let current = '';

    segments.forEach(segment => {
      if (!current) {
        current = segment;
        return;
      }

      const candidate = `${current} ${segment}`.trim();
      if (candidate.length <= SETTINGS.maxCueChars) {
        current = candidate;
      } else {
        cueTexts.push(current);
        current = segment;
      }
    });

    if (current) cueTexts.push(current);

    return cueTexts.flatMap(cue => splitSegment(cue, SETTINGS.maxCueChars));
  }

  function buildCueObjects(text, kind) {
    return textToCueTexts(text).map(cueText => ({
      kind,
      text: cueText,
      lines: wrapCueText(cueText).slice(0, SETTINGS.maxCueLines)
    })).filter(cue => cue.lines.length);
  }

  function trimVisibleCues(cues) {
    const picked = [];
    let totalLines = 0;

    for (let i = cues.length - 1; i >= 0; i--) {
      const cue = cues[i];
      const cueLines = Math.max(1, cue.lines.length);
      if (picked.length && (totalLines + cueLines) > SETTINGS.maxVisibleLines) break;
      if (!picked.length && cueLines > SETTINGS.maxVisibleLines) continue;
      picked.unshift(cue);
      totalLines += cueLines;
      if (totalLines >= SETTINGS.maxVisibleLines) break;
    }

    return picked;
  }

  function renderCueInto(container, cue, className) {
    const cueEl = document.createElement('div');
    cueEl.className = className;

    cue.lines.forEach(line => {
      const lineEl = document.createElement('div');
      lineEl.className = 'cue-line';
      lineEl.textContent = line || '\u00A0';
      cueEl.appendChild(lineEl);
    });

    container.appendChild(cueEl);
  }

  function render() {
    UI.historyStage.innerHTML = '';
    UI.liveStage.innerHTML = '';

    const visibleHistory = trimVisibleCues(state.committedCues);

    if (!visibleHistory.length && !state.interimCue) {
      renderCueInto(UI.historyStage, { lines: ['Waiting for speech…'] }, 'cue placeholder');
      UI.metaDetail.textContent = 'Fixed history stack';
      return;
    }

    visibleHistory.forEach((cue, index) => {
      const isLast = index === visibleHistory.length - 1;
      renderCueInto(UI.historyStage, cue, isLast ? 'cue current' : 'cue history');
    });

    if (state.interimCue) {
      renderCueInto(UI.liveStage, state.interimCue, 'cue live');
    }

    UI.metaDetail.textContent = state.interimCue
      ? 'Fixed history above · live cue below'
      : 'Fixed history stack';
  }

  function resetStablePrefixTracking() {
    state.stablePrefixCandidate = '';
    state.stablePrefixSeenCount = 0;
  }

  function getRemainingText(fullText) {
    const normalized = normalizeText(fullText);
    const promoted = normalizeText(state.promotedInterimPrefix);

    if (promoted && normalized.startsWith(promoted)) {
      return normalizeText(normalized.slice(promoted.length));
    }

    return normalized;
  }

  function findStableBreakIndex(text) {
    const normalized = normalizeText(text);
    if (!normalized) return -1;

    const safeText = normalized.slice(0, Math.max(0, normalized.length - SETTINGS.stablePrefixProtectTailChars)).trim();
    if (safeText.length < SETTINGS.stablePrefixMinChars) return -1;

    let bestIdx = -1;
    let bestScore = -Infinity;
    const words = safeText.split(' ').filter(Boolean);

    if (words.length >= 4) {
      for (let i = 1; i < words.length; i++) {
        const left = words.slice(0, i).join(' ').trim();
        const right = words.slice(i).join(' ').trim();
        if (!left || !right) continue;
        if (left.length < SETTINGS.stablePrefixMinChars) continue;
        if (left.length > SETTINGS.maxCueChars) break;

        const score = scoreBreak(words, i);
        if (score > bestScore) {
          bestScore = score;
          bestIdx = left.length;
        }
      }
    }

    if (bestScore < 55) bestIdx = -1;

    if (bestIdx === -1) {
      if (words.length >= 8) {
        let running = '';
        for (let i = 0; i < words.length; i++) {
          const candidate = `${running} ${words[i]}`.trim();
          if (candidate.length > SETTINGS.maxCueChars) break;
          running = candidate;
          if (running.length >= SETTINGS.stablePrefixMinChars) bestIdx = running.length;
        }
      }
    }

    return bestIdx;
  }

  function similarityTokens(text) {
    return normalizeText(text)
      .toLowerCase()
      .replace(/[^a-z0-9\s']/g, ' ')
      .split(/\s+/)
      .filter(Boolean);
  }

  function isNearDuplicateCueText(nextText, previousText) {
    const nextNormalized = normalizeText(nextText);
    const prevNormalized = normalizeText(previousText);
    if (!nextNormalized || !prevNormalized) return false;
    if (nextNormalized === prevNormalized) return true;

    const nextLower = nextNormalized.toLowerCase();
    const prevLower = prevNormalized.toLowerCase();
    if (nextLower.includes(prevLower) || prevLower.includes(nextLower)) {
      const shorter = Math.min(nextLower.length, prevLower.length);
      const longer = Math.max(nextLower.length, prevLower.length);
      if (shorter >= 20 && (shorter / longer) >= 0.82) return true;
    }

    const nextTokens = similarityTokens(nextNormalized);
    const prevTokens = similarityTokens(prevNormalized);
    if (!nextTokens.length || !prevTokens.length) return false;

    const nextSet = new Set(nextTokens);
    const prevSet = new Set(prevTokens);
    let shared = 0;
    nextSet.forEach(token => {
      if (prevSet.has(token)) shared += 1;
    });

    const overlap = shared / Math.max(nextSet.size, prevSet.size);
    const coverage = shared / Math.min(nextSet.size, prevSet.size);
    return shared >= 4 && overlap >= 0.72 && coverage >= 0.85;
  }

  function appendCommittedDelta(text) {
    const normalized = normalizeText(text);
    if (!normalized) return;

    const cues = buildCueObjects(normalized, 'committed').filter(cue => !isNearDuplicateCueText(cue.text, state.lastCommittedCueText));
    if (!cues.length) return;

    state.committedCues.push(...cues);
    state.committedCues = state.committedCues.slice(-SETTINGS.maxStoredCues);
    state.lastCommittedCueText = cues[cues.length - 1].text;
    state.lastCommittedText = normalized;
  }

  function promoteStablePrefix(fullInterimText) {
    const normalized = normalizeText(fullInterimText);
    if (!normalized) return false;

    const remaining = getRemainingText(normalized);
    const breakIdx = findStableBreakIndex(remaining);
    if (breakIdx === -1) return false;

    const promotableDelta = normalizeText(remaining.slice(0, breakIdx));
    if (!promotableDelta) return false;

    appendCommittedDelta(promotableDelta);
    state.promotedInterimPrefix = normalizeText(`${state.promotedInterimPrefix} ${promotableDelta}`);
    resetStablePrefixTracking();
    return true;
  }

  function evaluateStablePrefix(fullInterimText) {
    const remaining = getRemainingText(fullInterimText);
    const breakIdx = findStableBreakIndex(remaining);

    if (breakIdx === -1) {
      resetStablePrefixTracking();
      return false;
    }

    const candidate = normalizeText(remaining.slice(0, breakIdx));
    if (!candidate) {
      resetStablePrefixTracking();
      return false;
    }

    if (candidate === state.stablePrefixCandidate) {
      state.stablePrefixSeenCount += 1;
    } else {
      state.stablePrefixCandidate = candidate;
      state.stablePrefixSeenCount = 1;
    }

    if (state.stablePrefixSeenCount >= SETTINGS.stablePrefixConfirmations) {
      return promoteStablePrefix(fullInterimText);
    }

    return false;
  }

  function addCommittedText(text) {
    const normalized = normalizeText(text);
    if (!normalized) return;

    if (normalized === state.lastCommittedFullText) {
      state.interimCue = null;
      state.currentInterimFullText = '';
      state.promotedInterimPrefix = '';
      resetStablePrefixTracking();
      render();
      return;
    }

    let delta = normalized;
    const promoted = normalizeText(state.promotedInterimPrefix);
    if (promoted && normalized.startsWith(promoted)) {
      delta = normalizeText(normalized.slice(promoted.length));
    }

    if (!delta && normalized === state.lastCommittedText) {
      state.interimCue = null;
      state.currentInterimFullText = '';
      state.promotedInterimPrefix = '';
      resetStablePrefixTracking();
      render();
      return;
    }

    appendCommittedDelta(delta);
    state.lastCommittedFullText = normalized;
    state.lastInterimText = '';
    state.currentInterimFullText = '';
    state.interimCue = null;
    state.promotedInterimPrefix = '';
    resetStablePrefixTracking();
    render();
  }

  function shouldShowInterim(text) {
    if (!text) return false;
    if (text.length < SETTINGS.interimMinChars) return false;
    if (text.split(/\s+/).filter(Boolean).length < SETTINGS.interimMinWords) return false;
    if (text === state.lastCommittedText) return false;

    const now = Date.now();
    if ((now - state.lastInterimRenderedAt) < SETTINGS.interimDebounceMs) return false;

    return true;
  }

  function updateInterim(text) {
    const normalized = normalizeText(text);
    if (!shouldShowInterim(normalized)) return;

    if (state.promotedInterimPrefix && !normalized.startsWith(state.promotedInterimPrefix)) {
      state.promotedInterimPrefix = '';
      resetStablePrefixTracking();
    }

    state.currentInterimFullText = normalized;
    evaluateStablePrefix(normalized);

    const remaining = getRemainingText(normalized);
    if (!remaining) {
      state.interimCue = null;
      state.lastInterimText = normalized;
      state.lastInterimRenderedAt = Date.now();
      render();
      return;
    }

    if (remaining === state.lastInterimText) return;

    const cues = buildCueObjects(remaining, 'interim');
    if (!cues.length) return;

    // For long unfinished speech, show the *next* phrase after the promoted
    // history prefix, not the last chunk of the tail. Showing the last chunk
    // makes the live cue appear to jump ahead and hides the immediate
    // continuation the audience expects to read next.
    state.interimCue = cues[0];
    state.lastInterimText = remaining;
    state.lastInterimRenderedAt = Date.now();
    render();
  }

  const socket = io({
    transports: ['polling'],
    reconnection: true,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 3000
  });

  socket.on('connect', () => {
    setStatus('Connected', 'ok');
  });

  socket.on('disconnect', () => {
    setStatus('Disconnected — reconnecting…', 'warn');
  });

  socket.on('status', (data) => {
    setStatus(data.message, data.level || 'ok');
  });

  socket.on('caption_update', (data) => {
    const text = normalizeText(data.text || '');
    if (!text) return;
    updateInterim(text);
  });

  socket.on('caption_commit', (data) => {
    const text = normalizeText(data.text || '');
    if (!text) return;
    addCommittedText(text);
  });

  render();
})();
</script>
</body>
</html>
